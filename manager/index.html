<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wide Brazil — Proposals Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Montserrat, sans-serif; background: #0D1B2E; color: #fff; min-height: 100vh; }

header {
  background: #0a1628;
  border-bottom: 2px solid #00C8C8;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo h1 { font-size: 18px; font-weight: 700; color: #00C8C8; }
.logo span { font-size: 12px; color: #8899aa; display: block; font-weight: 400; }
#status { font-size: 12px; color: #8899aa; }
#status.loading { color: #00C8C8; }
#status.error { color: #ff6b6b; }

main { padding: 40px; max-width: 1100px; margin: 0 auto; }

.stats { display: flex; gap: 16px; margin-bottom: 40px; }
.stat { background: #132338; border: 1px solid #1e3a5f; border-radius: 10px; padding: 20px 28px; }
.stat-value { font-size: 32px; font-weight: 700; color: #00C8C8; }
.stat-label { font-size: 12px; color: #8899aa; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

.search-bar {
  background: #132338;
  border: 1px solid #1e3a5f;
  border-radius: 10px;
  padding: 12px 20px;
  width: 100%;
  color: #fff;
  font-family: Montserrat, sans-serif;
  font-size: 14px;
  margin-bottom: 32px;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar:focus { border-color: #00C8C8; }
.search-bar::placeholder { color: #8899aa; }

.client-section { margin-bottom: 36px; }
.client-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.client-hex {
  width: 32px; height: 32px;
  background: #00C8C820;
  border: 1px solid #00C8C840;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #00C8C8;
  flex-shrink: 0;
}
.client-name { font-size: 16px; font-weight: 700; color: #fff; text-transform: capitalize; }
.client-count { font-size: 12px; color: #8899aa; }

.docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

.doc-card {
  background: #132338;
  border: 1px solid #1e3a5f;
  border-radius: 10px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.2s, background 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}
.doc-card:hover { border-color: #00C8C8; background: #162840; }
.doc-info { flex: 1; min-width: 0; }
.doc-name {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-transform: capitalize;
  margin-bottom: 4px;
}
.doc-url { font-size: 11px; color: #8899aa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-actions { display: flex; gap: 8px; margin-left: 12px; flex-shrink: 0; }
.btn-copy, .btn-open {
  width: 30px; height: 30px;
  border-radius: 6px;
  border: 1px solid #1e3a5f;
  background: #0D1B2E;
  color: #8899aa;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-copy:hover { border-color: #00C8C8; color: #00C8C8; }
.btn-open:hover { border-color: #00C8C8; color: #00C8C8; }
.btn-copy.copied { border-color: #00C8C8; color: #00C8C8; background: #00C8C820; }

.empty { color: #8899aa; text-align: center; padding: 60px 0; font-size: 14px; }
.skeleton { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.skel-card { background: #132338; border-radius: 10px; height: 66px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="#00C8C8" opacity="0.12" stroke="#00C8C8" stroke-width="1.5"/>
      <text x="18" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#00C8C8" font-family="Montserrat,sans-serif">W</text>
    </svg>
    <div>
      <h1>Wide Brazil</h1>
      <span>Proposals Manager</span>
    </div>
  </div>
  <div id="status" class="loading">Loading proposals...</div>
</header>

<main>
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Documents</div></div>
    <div class="stat"><div class="stat-value" id="stat-clients">0</div><div class="stat-label">Clients</div></div>
  </div>

  <input type="text" class="search-bar" id="search" placeholder="Search by client or document name..." oninput="renderAll()">

  <div id="content">
    <div class="skeleton">
      <div class="skel-card"></div>
      <div class="skel-card"></div>
      <div class="skel-card"></div>
    </div>
  </div>
</main>

<script>
const REPO = 'abussafilx/wide-proposals';
const BASE_URL = 'https://widelatam.you';
const EXCLUDED = ['index.html', 'netlify.toml', 'README.md', 'teste', 'manager'];
let data = {}; // { clientName: [filename, ...] }

async function fetchProposals() {
  try {
    // Get root contents
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
    const root = await res.json();

    const folders = root.filter(f => f.type === 'dir' && !EXCLUDED.includes(f.name));

    // Fetch each client folder in parallel
    const results = await Promise.all(folders.map(async folder => {
      const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${folder.name}`);
      const files = await r.json();
      const htmlFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.html'));
      return { client: folder.name, files: htmlFiles.map(f => f.name.replace('.html', '')) };
    }));

    results.forEach(({ client, files }) => {
      if (files.length > 0) data[client] = files;
    });

    renderAll();
    updateStats();
    document.getElementById('status').textContent = 'Live from GitHub';
    document.getElementById('status').className = '';
    document.getElementById('stats').style.display = 'flex';
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to load';
    document.getElementById('status').className = 'error';
    document.getElementById('content').innerHTML = '<p class="empty">Could not load proposals. Check your connection.</p>';
  }
}

function updateStats() {
  const total = Object.values(data).reduce((a, b) => a + b.length, 0);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-clients').textContent = Object.keys(data).length;
}

function renderAll() {
  const query = document.getElementById('search').value.toLowerCase();
  const content = document.getElementById('content');

  const filtered = {};
  Object.entries(data).forEach(([client, files]) => {
    const matchedFiles = files.filter(f =>
      client.includes(query) || f.includes(query)
    );
    if (matchedFiles.length > 0) filtered[client] = matchedFiles;
  });

  if (Object.keys(filtered).length === 0) {
    content.innerHTML = '<p class="empty">No documents found.</p>';
    return;
  }

  content.innerHTML = Object.entries(filtered).map(([client, files]) => `
    <div class="client-section">
      <div class="client-header">
        <div class="client-hex">${client.slice(0,2).toUpperCase()}</div>
        <div class="client-name">${client}</div>
        <div class="client-count">${files.length} doc${files.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="docs-grid">
        ${files.map(file => `
          <div class="doc-card">
            <div class="doc-info">
              <div class="doc-name">${file.replace(/-/g, ' ')}</div>
              <div class="doc-url">${BASE_URL}/${client}/${file}</div>
            </div>
            <div class="doc-actions">
              <button class="btn-copy" title="Copy link" onclick="copyLink(event, '${BASE_URL}/${client}/${file}')">⎘</button>
              <a class="btn-open" href="${BASE_URL}/${client}/${file}" target="_blank" title="Open">↗</a>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function copyLink(e, url) {
  e.preventDefault();
  e.stopPropagation();
  navigator.clipboard.writeText(url).then(() => {
    const btn = e.currentTarget;
    btn.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⎘'; }, 1500);
  });
}

fetchProposals();
</script>
</body>
</html>
