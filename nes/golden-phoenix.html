document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n    <div class=\"hero-top\">\n      <div class=\"hero-logo\"><img src=\"3c7836d7-cbae-4f79-b20b-2c1476641844\" alt=\"Wide Brazil\"><\u002Fdiv>\n      <div class=\"hero-meta\">Commercial Proposal · May 2026<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-grid\">\n      <div class=\"hero-left\">\n        <div class=\"stamp\"><span class=\"dot\"><\u002Fspan> Confidential · v5.0<\u002Fdiv>\n        <h1 class=\"hero-title\">Employer of Record <span class=\"grad\">in Brazil<\u002Fspan><\u002Fh1>\n        <p class=\"hero-sub\">Full CLT employment structure for Data Engineering, Data Science, and AI Platform roles. Compliant, IP-protected, single-invoice billing in USD.<\u002Fp>\n        <div class=\"hero-tags\">\n          <span class=\"primary\">CLT Employment<\u002Fspan>\n          <span>IP &amp; NDA Protected<\u002Fspan>\n          <span>Payroll &amp; Compliance<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-card\">\n        <div class=\"hero-card-stripe\"><\u002Fdiv>\n        <h5>At a glance<\u002Fh5>\n        <div class=\"hero-card-row\"><span class=\"l\">Client<\u002Fspan><span class=\"v\">bp<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-card-row\"><span class=\"l\">Project<\u002Fspan><span class=\"v\">Golden Phoenix<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-card-row\"><span class=\"l\">Scope<\u002Fspan><span class=\"v\">Data &amp; AI roles<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-card-row\"><span class=\"l\">Location<\u002Fspan><span class=\"v\">São Paulo · Brazil<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-card-row\"><span class=\"l\">Reference<\u002Fspan><span class=\"v\">WB-BR-EOR-2026-05<\u002Fspan><\u002Fdiv>\n        <div class=\"hero-card-row\"><span class=\"l\">Validity<\u002Fspan><span class=\"v\">30 days<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-bottom\">\n      <span class=\"green\">widebrazil.com<\u002Fspan>\n      <span>Brazilian DNA · Global mindset<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ABOUT ============ -->\n<section class=\"section\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 01<\u002Fspan><span class=\"label\">Who we are<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Brazilian DNA. <em>Global mindset.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">Wide Brazil is the leading local Employer of Record and recruitment consultancy for international companies entering Latin America — with a direct legal entity in São Paulo and ten years of regulatory depth under the CLT.<\u002Fp>\n\n    <div class=\"cred-row\">\n      <div class=\"cred-card\"><div class=\"v\">10+<\u002Fdiv><div class=\"l\">Years operating under CLT and Brazilian regulation<\u002Fdiv><\u002Fdiv>\n      <div class=\"cred-card\"><div class=\"v\">#1<\u002Fdiv><div class=\"l\">EOR for international tech expansion into Brazil<\u002Fdiv><\u002Fdiv>\n      <div class=\"cred-card\"><div class=\"v\">100+<\u002Fdiv><div class=\"l\">International clients placed and managed<\u002Fdiv><\u002Fdiv>\n      <div class=\"cred-card\"><div class=\"v\">1000+<\u002Fdiv><div class=\"l\">Hires across LATAM jurisdictions<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHY CLT ============ -->\n<section class=\"section tinted\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 02<\u002Fspan><span class=\"label\">Why CLT is the only viable structure<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Misclassification risk is <em>automatic<\u002Fem> when four criteria coincide.<\u002Fh2>\n    <p class=\"lede\">Brazil's <strong>Consolidação das Leis do Trabalho (CLT)<\u002Fstrong> creates a legal presumption of employment whenever four conditions are simultaneously present. All Golden Phoenix roles satisfy each in full.<\u002Fp>\n\n    <div class=\"crit-grid\">\n      <div class=\"crit-card\">\n        <div class=\"n\">Criterion 01<\u002Fdiv>\n        <h4>Pessoalidade <em>— personal service<\u002Fem><\u002Fh4>\n        <p>Work performed personally by a named individual. All roles require named employees on fixed US CST hours — not substitutable.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"crit-card\">\n        <div class=\"n\">Criterion 02<\u002Fdiv>\n        <h4>Não-eventualidade <em>— continuity<\u002Fem><\u002Fh4>\n        <p>Regular, ongoing engagement. Full-time 9:00–18:00 CST, five days per week constitutes continuous employment under CLT Art. 3.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"crit-card\">\n        <div class=\"n\">Criterion 03<\u002Fdiv>\n        <h4>Onerosidade <em>— remuneration<\u002Fem><\u002Fh4>\n        <p>Fixed monthly gross salary is the defining characteristic of an employment relationship under CLT Art. 458.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"crit-card\">\n        <div class=\"n\">Criterion 04<\u002Fdiv>\n        <h4>Subordinação <em>— subordination<\u002Fem><\u002Fh4>\n        <p>Workers use bp platforms (Azure, Databricks), follow bp methodologies, and report to bp project managers — full technical and operational subordination.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"warn\">\n      <div class=\"marker\">Misclassification exposure<\u002Fdiv>\n      <p>When these four criteria coincide, Brazilian Labour Courts <strong>automatically reclassify<\u002Fstrong> contractor arrangements as CLT employment — retroactively from day one. Exposure per worker: <strong>24–36× the monthly gross salary<\u002Fstrong> (FGTS + 40% penalty, 13th salaries, vacation, INSS, fines, and legal costs).<\u002Fp>\n    <\u002Fdiv>\n\n    <h2 class=\"section-title\" style=\"font-size:32px;margin-top:72px;margin-bottom:12px\">IP protection, NDAs &amp; confidentiality<\u002Fh2>\n    <p class=\"body\" style=\"margin-bottom:0\">CLT employment provides bp with the strongest legal framework for IP ownership and confidentiality — materially superior to any contractor arrangement.<\u002Fp>\n\n    <div class=\"ip-grid\">\n      <div class=\"ip-card\">\n        <h4>Full IP ownership<\u002Fh4>\n        <p>Under Law 9.279/96 and CLT Art. 454, all code, inventions, and work product created during employment using company resources belong exclusively to the employer — automatically by law.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ip-card\">\n        <h4>Enforceable NDAs<\u002Fh4>\n        <p>Confidentiality clauses in CLT contracts are fully enforceable. Breach constitutes just cause <em>(justa causa)<\u002Fem> — enabling immediate termination and civil damages under the Civil Code.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ip-card\">\n        <h4>Non-solicit &amp; non-compete<\u002Fh4>\n        <p>Valid and enforceable with a defined time limit (≤2 years), geographic scope, and financial compensation during the restricted period. Drafted to bp's specifications at onboarding.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout\">\n      <div class=\"marker\">Contractor (PJ) contrast<\u002Fdiv>\n      <p>IP ownership over work produced by independent contractors (PJ) is ambiguous and contentious in Brazil. Courts have historically protected contractors' rights to their own work product. <strong>CLT employment eliminates this risk entirely.<\u002Fstrong><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WORKING HOURS ============ -->\n<section class=\"section\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 03<\u002Fspan><span class=\"label\">CLT working hours<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">The bp schedule sits <em>fully within<\u002Fem> CLT limits.<\u002Fh2>\n    <p class=\"lede\">The bp schedule of <strong>9:00–18:00 CST<\u002Fstrong> (10:00–19:00 BRT) falls inside the statutory framework — zero overtime exposure when respected.<\u002Fp>\n\n    <div class=\"hours-grid\">\n      <div class=\"hours-card\">\n        <div class=\"v\"><em>44<\u002Fem>h<\u002Fdiv>\n        <h4>Maximum weekly hours<\u002Fh4>\n        <p>CLT Art. 58. Standard is 8h/day Mon–Fri + 4h Saturday. The bp 9-to-6 schedule (8h worked + 1h lunch) is fully within limits.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"hours-card\">\n        <div class=\"v\">+<em>2<\u002Fem>h<\u002Fdiv>\n        <h4>Maximum daily overtime<\u002Fh4>\n        <p>CLT Art. 59. Capped at 2 extra hours/day at +50% premium on weekdays, +100% on Sundays and public holidays.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"hours-card\">\n        <div class=\"v\"><em>1<\u002Fem>h<\u002Fdiv>\n        <h4>Mandatory lunch break<\u002Fh4>\n        <p>CLT Art. 71. Minimum 1h break for shifts over 6h — unpaid and not counted as worked time. The 9–18 schedule complies exactly.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout\">\n      <div class=\"marker\">Night shift &amp; on-call<\u002Fdiv>\n      <p>Hours between 22:00–05:00 BRT carry a mandatory <strong>+20% night premium<\u002Fstrong> (CLT Art. 73). The CST schedule (10:00–19:00 BRT) avoids this entirely. Any on-call obligations must be contractually defined before signing.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SCOPE ============ -->\n<section class=\"section tinted\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 04<\u002Fspan><span class=\"label\">Scope of EOR services<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">What's <em>included<\u002Fem>.<\u002Fh2>\n    <p class=\"lede\">Everything required to compliantly employ, pay, and offboard a CLT employee in Brazil. Single monthly invoice in USD.<\u002Fp>\n\n    <div class=\"scope-grid\">\n      <div class=\"scope-card\">\n        <div class=\"scope-card-head\"><span class=\"num\">01<\u002Fspan><h4>Onboarding &amp; employment<\u002Fh4><\u002Fdiv>\n        <ul>\n          <li><div><span class=\"n\">CLT contract — bilingual<\u002Fspan><span class=\"d\">With IP, NDA, and non-compete clauses drafted to bp specifications.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><div><span class=\"n\">CTPS registration + eSocial<\u002Fspan><span class=\"d\">Full digital onboarding via eSocial federal platform.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><div><span class=\"n\">Documents, background check, ASO<\u002Fspan><span class=\"d\">Document collection, background verification, and the mandatory ASO medical exam.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"scope-card\">\n        <div class=\"scope-card-head\"><span class=\"num\">02<\u002Fspan><h4>Payroll &amp; benefits<\u002Fh4><\u002Fdiv>\n        <ul>\n          <li><div><span class=\"n\">Monthly payroll<\u002Fspan><span class=\"d\">Gross-to-net calculation. INSS, IRRF, FGTS deductions. Holerite issued each cycle.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><div><span class=\"n\">13th salary + vacation bonus<\u002Fspan><span class=\"d\">Provisioned and paid per the legal schedule (Nov/Dec + 1/3 bonus on leave).<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><div><span class=\"n\">Benefits administration<\u002Fspan><span class=\"d\">Meal card (VR/VA), life insurance, health &amp; wellness plan administered on bp's behalf.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"scope-card\">\n        <div class=\"scope-card-head\"><span class=\"num\">03<\u002Fspan><h4>Compliance &amp; reporting<\u002Fh4><\u002Fdiv>\n        <ul>\n          <li><div><span class=\"n\">FGTS &amp; INSS<\u002Fspan><span class=\"d\">Filed and paid monthly to Caixa Econômica Federal and Receita Federal.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><div><span class=\"n\">DIRF, RAIS, eSocial events<\u002Fspan><span class=\"d\">All federal declarations submitted on time on bp's behalf.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><div><span class=\"n\">Hours monitoring<\u002Fspan><span class=\"d\">Overtime and night-premium alerts. Monthly reconciliation against the bp schedule.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"scope-card\">\n        <div class=\"scope-card-head\"><span class=\"num\">04<\u002Fspan><h4>Offboarding &amp; risk<\u002Fh4><\u002Fdiv>\n        <ul>\n          <li><div><span class=\"n\">Termination<\u002Fspan><span class=\"d\">Homologação, FGTS release, and Seguro Desemprego filing where applicable.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><div><span class=\"n\">Liability containment<\u002Fspan><span class=\"d\">Wide Brazil assumes all employer-of-record risk in Brazil — bp has no direct labour exposure.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><div><span class=\"n\">HR advisory<\u002Fspan><span class=\"d\">CLT, salary adjustments, disciplinary processes. Senior consultant assigned to the account.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ BENEFITS ============ -->\n<section class=\"section\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 05<\u002Fspan><span class=\"label\">Employee benefits<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Pass-through at <em>cost<\u002Fem>. No markup.<\u002Fh2>\n    <p class=\"lede\">For senior bilingual tech roles in Brazil, benefits are not optional — they are a baseline market requirement. A full package is included as standard and reflected at cost in the simulation.<\u002Fp>\n\n    <div class=\"ben-grid\">\n      <div class=\"ben-card\">\n        <div class=\"top\"><h4>Meal allowance (VR/VA)<\u002Fh4><span class=\"tag mand\">Statutory<\u002Fspan><\u002Fdiv>\n        <p>Required under PAT program (Law 6.321/76). Tax-efficient for both employer and employee.<\u002Fp>\n        <div class=\"pct\">Included in benefits line<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ben-card\">\n        <div class=\"top\"><h4>Vale Transporte<\u002Fh4><span class=\"tag mand\">Statutory<\u002Fspan><\u002Fdiv>\n        <p>Law 7.418/85. For fully-remote workers, replaced with a home-office / internet stipend by mutual agreement.<\u002Fp>\n        <div class=\"pct\">Included in benefits line<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ben-card\">\n        <div class=\"top\"><h4>Life insurance<\u002Fh4><span class=\"tag mand\">CCT-required<\u002Fspan><\u002Fdiv>\n        <p>Mandated by the applicable Collective Bargaining Agreement (CCT) for tech-sector workers. Group policy administered on bp's behalf.<\u002Fp>\n        <div class=\"pct\">Included in benefits line<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ben-card\" style=\"grid-column:span 3\">\n        <div class=\"top\"><h4>Health &amp; wellness package<\u002Fh4><span class=\"tag incl\">Included<\u002Fspan><\u002Fdiv>\n        <p>Comprehensive package covering health insurance (corporate plan — hospitalisation, specialists, exams, emergency care), dental insurance, and a wellness programme (Gympass or equivalent). Administered as a single benefit line. Required for attracting and retaining bilingual senior tech professionals in the Brazilian market.<\u002Fp>\n        <div class=\"pct\">14.7% of gross monthly salary — included in the cost simulation<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ben-summary\">\n      <div class=\"l\">\n        <h5>Total benefits included in proposal<\u002Fh5>\n        <p>Meal allowance · life insurance · health &amp; wellness · transport / home-office stipend — pass-through at cost, no markup.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"r\"><div class=\"v\"><em>14.7%<\u002Fem><\u002Fdiv><div class=\"sub\">of gross monthly salary<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ COST SIMULATION ============ -->\n<section class=\"section tinted\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 06<\u002Fspan><span class=\"label\">Cost simulation<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Estimate the <em>full monthly cost<\u002Fem>.<\u002Fh2>\n    <p class=\"lede\">Drag the salary slider to see how statutory charges, provisions, benefits and Wide Brazil's fee combine into your monthly USD invoice. Updates live. FX reference: <strong>1 USD = R$ 5.07<\u002Fstrong> (May 2026).<\u002Fp>\n\n    <div class=\"sim\" id=\"sim\">\n      <div class=\"sim-card input\">\n        <div class=\"head\">Inputs<\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"ctrl\">\n            <div class=\"ctrl-label\"><span class=\"l\">Gross monthly salary<\u002Fspan><span class=\"v\"><span class=\"c\" data-c-prefix=\"\">R$<\u002Fspan><span data-out=\"salary\">20,000<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"8000\" max=\"60000\" step=\"500\" value=\"20000\" data-in=\"salary\">\n          <\u002Fdiv>\n          <div class=\"ctrl\">\n            <div class=\"ctrl-label\"><span class=\"l\">Salary currency<\u002Fspan><span class=\"v\" data-out=\"cur-label\">BRL<\u002Fspan><\u002Fdiv>\n            <div class=\"seg\" data-seg=\"cur\">\n              <button data-val=\"BRL\" class=\"on\">BRL (R$)<\u002Fbutton>\n              <button data-val=\"USD\">USD ($)<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ctrl\">\n            <div class=\"ctrl-label\"><span class=\"l\">Headcount<\u002Fspan><span class=\"v\" data-out=\"hc\">1<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"1\" max=\"20\" step=\"1\" value=\"1\" data-in=\"hc\">\n          <\u002Fdiv>\n          <div class=\"ctrl\">\n            <div class=\"ctrl-label\"><span class=\"l\">Benefits package<\u002Fspan><span class=\"v\"><span data-out=\"benefits\">14.7<\u002Fspan>%<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" min=\"0\" max=\"25\" step=\"0.5\" value=\"14.7\" data-in=\"benefits\">\n          <\u002Fdiv>\n          <div class=\"ctrl\">\n            <div class=\"ctrl-label\"><span class=\"l\">RAT / SAT rate<\u002Fspan><span class=\"v\"><span data-out=\"rat\">3.0<\u002Fspan>%<\u002Fspan><\u002Fdiv>\n            <div class=\"seg\" data-seg=\"rat\">\n              <button data-val=\"1\">1.0%<\u002Fbutton>\n              <button data-val=\"2\">2.0%<\u002Fbutton>\n              <button data-val=\"3\" class=\"on\">3.0%<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sim-card output\">\n        <div class=\"head\">Monthly employer cost (per headcount)<\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"sim-headline-label\">Total invoice in USD · including VAT/GST 8.5%<\u002Fdiv>\n          <div class=\"sim-headline\"><em data-out=\"grandUSD\">$ 7,221<\u002Fem><\u002Fdiv>\n          <div class=\"sim-secondary\">\n            <div class=\"item\"><div class=\"l\">In BRL<\u002Fdiv><div class=\"v\" data-out=\"grandBRL\">R$ 36,613<\u002Fdiv><\u002Fdiv>\n            <div class=\"item\"><div class=\"l\">Markup vs gross<\u002Fdiv><div class=\"v\" data-out=\"markup\">79.2%<\u002Fdiv><\u002Fdiv>\n            <div class=\"item\"><div class=\"l\">Annual (× headcount)<\u002Fdiv><div class=\"v\" data-out=\"annualHC\">$ 86,650<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"sim-rows\">\n            <div class=\"sim-row\"><span class=\"l\">Gross monthly salary<\u002Fspan><span class=\"pct\">100%<\u002Fspan><span class=\"v\" data-out=\"grossBRL\">R$ 20,000<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row group\"><span class=\"l\">Statutory charges<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">FGTS<\u002Fspan><span class=\"pct\">8.0%<\u002Fspan><span class=\"v\" data-out=\"fgts\">R$ 1,600<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">INSS patronal<\u002Fspan><span class=\"pct\">20.0%<\u002Fspan><span class=\"v\" data-out=\"inss\">R$ 4,000<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">RAT / SAT<\u002Fspan><span class=\"pct\" data-out=\"ratPct\">3.0%<\u002Fspan><span class=\"v\" data-out=\"ratV\">R$ 600<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">Sistema S<\u002Fspan><span class=\"pct\">5.8%<\u002Fspan><span class=\"v\" data-out=\"sis\">R$ 1,160<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row group\"><span class=\"l\">Annual provisions (1/12 monthly)<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">13th salary<\u002Fspan><span class=\"pct\">8.3%<\u002Fspan><span class=\"v\" data-out=\"thirteenth\">R$ 1,667<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">Vacation bonus 1/3<\u002Fspan><span class=\"pct\">2.8%<\u002Fspan><span class=\"v\" data-out=\"vac\">R$ 556<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">Charges on provisions<\u002Fspan><span class=\"pct\">4.1%<\u002Fspan><span class=\"v\" data-out=\"prov\">R$ 818<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row group\"><span class=\"l\">Benefits &amp; fee<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">Benefits package<\u002Fspan><span class=\"pct\" data-out=\"benPct\">14.7%<\u002Fspan><span class=\"v\" data-out=\"ben\">R$ 2,940<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">Management profit<\u002Fspan><span class=\"pct\">2.0%<\u002Fspan><span class=\"v\" data-out=\"profit\">R$ 400<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l indent\">EOR management fee<\u002Fspan><span class=\"pct\">fixed<\u002Fspan><span class=\"v\" data-out=\"fee\">$ 199<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row total\"><span class=\"l\">Subtotal (excl. tax)<\u002Fspan><span class=\"v\" data-out=\"subUSD\">$ 6,656<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row\"><span class=\"l\">VAT / GST<\u002Fspan><span class=\"pct\">8.5%<\u002Fspan><span class=\"v\" data-out=\"vat\">$ 566<\u002Fspan><\u002Fdiv>\n            <div class=\"sim-row total\"><span class=\"l\">Total monthly invoice<\u002Fspan><span class=\"v\" data-out=\"grandUSD2\">$ 7,221<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"sim-foot\">All BRL values pass through at cost. <strong>Management fee USD 199 / month / headcount<\u002Fstrong>, plus 2% management profit on gross. VAT/GST 8.5% applied to the full invoice. Numbers are illustrative — final values depend on union (CCT), RAT/SAT classification, and prevailing FX.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PRICING ============ -->\n<section class=\"section\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 07<\u002Fspan><span class=\"label\">Pricing<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Two clear components.<\u002Fh2>\n    <p class=\"lede\">A fixed monthly management fee per CLT headcount, plus 2% management profit on the gross salary. Everything else — statutory charges and benefits — is pass-through at cost. VAT/GST 8.5% is applied to the total invoice.<\u002Fp>\n\n    <div class=\"price-cards\">\n      <div class=\"price-card featured\">\n        <div class=\"price-card-head\">\n          <div class=\"tag\">Per headcount<\u002Fdiv>\n          <h4>EOR management fee<\u002Fh4>\n          <p>Fixed in USD, per CLT employee, per month. Locked for the contract duration.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"price-figure\"><span class=\"v\"><em>USD 199<\u002Fem><\u002Fspan><span class=\"u\">/ month / FTE<\u002Fspan><\u002Fdiv>\n        <div class=\"price-card-body\">\n          <div class=\"price-line\"><span>Statutory employer charges<\u002Fspan><strong>Pass-through<\u002Fstrong><\u002Fdiv>\n          <div class=\"price-line\"><span>Benefits (meal, life, health)<\u002Fspan><strong>Pass-through<\u002Fstrong><\u002Fdiv>\n          <div class=\"price-line\"><span>Setup, onboarding, offboarding<\u002Fspan><strong>None<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"price-note\">Single monthly invoice in USD covering total payroll plus the management fee.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"price-card featured\">\n        <div class=\"price-card-head\">\n          <div class=\"tag\">% on gross<\u002Fdiv>\n          <h4>Management profit<\u002Fh4>\n          <p>Applied to the monthly gross salary. Wide Brazil's commercial margin — fully transparent.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"price-figure\"><span class=\"v\"><em>2.0%<\u002Fem><\u002Fspan><span class=\"u\">on gross salary<\u002Fspan><\u002Fdiv>\n        <div class=\"price-card-body\">\n          <div class=\"price-line\"><span>VAT / GST on total invoice<\u002Fspan><strong>8.5%<\u002Fstrong><\u002Fdiv>\n          <div class=\"price-line\"><span>Recruitment success fee<\u002Fspan><strong>Quoted per role<\u002Fstrong><\u002Fdiv>\n          <div class=\"price-line\"><span>Replacement guarantee<\u002Fspan><strong>6 months · no fee<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"price-note\">If sourcing is required, recruitment is quoted separately based on role seniority — typically a one-time success fee at offer acceptance.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ MARKET RATES ============ -->\n<section class=\"section tinted\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 08<\u002Fspan><span class=\"label\">Market pay rates &amp; project considerations<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Gross monthly benchmarks for <em>Golden Phoenix<\u002Fem> roles.<\u002Fh2>\n    <p class=\"lede\">Indicative São Paulo / remote ranges for Data, ML and AI Platform roles at the seniority levels typically required. Even at the max bilingual rates, Brazil remains approximately <strong>45% less expensive<\u002Fstrong> than equivalent US talent.<\u002Fp>\n\n    <div class=\"rate-table\">\n      <div class=\"rate-thead\">\n        <div>Role<\u002Fdiv>\n        <div>Min · BRL gross<\u002Fdiv>\n        <div>Max · BRL gross<\u002Fdiv>\n        <div class=\"qty\">Max · USD<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rate-section\">Data Engineering<\u002Fdiv>\n      <div class=\"rate-row\">\n        <div class=\"role\">Data Engineer<span class=\"seniority\">Mid-level · 3–5 yrs<\u002Fspan><\u002Fdiv>\n        <div class=\"num\">R$ 14,000<span class=\"sub\">non-English<\u002Fspan><\u002Fdiv>\n        <div class=\"num max\">R$ 22,000<span class=\"sub\">bilingual<\u002Fspan><\u002Fdiv>\n        <div class=\"num qty\">≈ $ 4,340<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rate-row\">\n        <div class=\"role\">Senior Data Engineer<span class=\"seniority\">Senior · 5–8 yrs<\u002Fspan><\u002Fdiv>\n        <div class=\"num\">R$ 22,000<span class=\"sub\">non-English<\u002Fspan><\u002Fdiv>\n        <div class=\"num max\">R$ 32,000<span class=\"sub\">bilingual<\u002Fspan><\u002Fdiv>\n        <div class=\"num qty\">≈ $ 6,313<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rate-row\">\n        <div class=\"role\">Data Engineering Lead<span class=\"seniority\">Lead · 8+ yrs · people management<\u002Fspan><\u002Fdiv>\n        <div class=\"num\">—<\u002Fdiv>\n        <div class=\"num max\">R$ 42,000<span class=\"sub\">bilingual<\u002Fspan><\u002Fdiv>\n        <div class=\"num qty\">≈ $ 8,287<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rate-section\">Data Science &amp; ML<\u002Fdiv>\n      <div class=\"rate-row\">\n        <div class=\"role\">Data Scientist<span class=\"seniority\">Mid-senior · 4–6 yrs<\u002Fspan><\u002Fdiv>\n        <div class=\"num\">R$ 16,000<span class=\"sub\">non-English<\u002Fspan><\u002Fdiv>\n        <div class=\"num max\">R$ 26,000<span class=\"sub\">bilingual<\u002Fspan><\u002Fdiv>\n        <div class=\"num qty\">≈ $ 5,128<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rate-row\">\n        <div class=\"role\">ML Engineer<span class=\"seniority\">Senior · 5–8 yrs<\u002Fspan><\u002Fdiv>\n        <div class=\"num\">R$ 22,000<span class=\"sub\">non-English<\u002Fspan><\u002Fdiv>\n        <div class=\"num max\">R$ 34,000<span class=\"sub\">bilingual<\u002Fspan><\u002Fdiv>\n        <div class=\"num qty\">≈ $ 6,706<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rate-section\">AI Platform<\u002Fdiv>\n      <div class=\"rate-row\">\n        <div class=\"role\">AI Platform Engineer<span class=\"seniority\">Senior · Azure / Databricks<\u002Fspan><\u002Fdiv>\n        <div class=\"num\">R$ 24,000<span class=\"sub\">non-English<\u002Fspan><\u002Fdiv>\n        <div class=\"num max\">R$ 36,000<span class=\"sub\">bilingual<\u002Fspan><\u002Fdiv>\n        <div class=\"num qty\">≈ $ 7,101<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rate-row\">\n        <div class=\"role\">AI Platform Manager<span class=\"seniority\">Lead · 8+ yrs · platform ownership<\u002Fspan><\u002Fdiv>\n        <div class=\"num\">—<\u002Fdiv>\n        <div class=\"num max\">R$ 48,000<span class=\"sub\">bilingual<\u002Fspan><\u002Fdiv>\n        <div class=\"num qty\">≈ $ 9,467<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"notes-2col\">\n      <div class=\"note-card\">\n        <h4>English proficiency &amp; pay<\u002Fh4>\n        <h5>Most Golden Phoenix hires will sit at the max bilingual rate.<\u002Fh5>\n        <p>Because workers will be embedded in bp's US project teams, <strong>bilingual (English / Portuguese)<\u002Fstrong> candidates will be required for most roles — particularly at manager and senior engineer levels.<\u002Fp>\n        <ul>\n          <li><strong>Min rate<\u002Fstrong> — non-English candidates, suitable for complementary technical roles with limited direct US-team interaction.<\u002Fli>\n          <li><strong>Max rate<\u002Fstrong> — bilingual candidates with fluent English. The effective rate for the majority of Golden Phoenix hires.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"note-card\">\n        <h4>Hiring timeline<\u002Fh4>\n        <h5>From kick-off to day one.<\u002Fh5>\n        <p>Typical end-to-end timeline for a bilingual senior tech role, assuming the candidate is currently employed and must serve standard notice.<\u002Fp>\n        <ul>\n          <li><strong>3–4 weeks<\u002Fstrong> — sourcing, screening and shortlist presentation<\u002Fli>\n          <li><strong>1 week<\u002Fstrong> — bp manager reviews CVs and conducts interviews<\u002Fli>\n          <li><strong>1–2 weeks<\u002Fstrong> — offer, contracts, background check, eSocial, benefits enrolment<\u002Fli>\n          <li><strong>+20 days<\u002Fstrong> — notice period if the candidate is currently employed<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tl-summary\">\n      <div class=\"l\">Estimated <strong>total time from kick-off to day one<\u002Fstrong>, per role<\u002Fdiv>\n      <div class=\"v\"><em>8–10<\u002Fem> weeks<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TIMELINE ============ -->\n<section class=\"section\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 09<\u002Fspan><span class=\"label\">From kick-off to day one<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">Four phases per role.<\u002Fh2>\n\n    <div class=\"timeline\">\n      <div class=\"tl-step\"><div class=\"dot\">01<\u002Fdiv><div class=\"v\"><em>3–4<\u002Fem>w<\u002Fdiv><h4>Sourcing &amp; shortlist<\u002Fh4><p>Active search, screening, and presentation of qualified candidates to bp.<\u002Fp><\u002Fdiv>\n      <div class=\"tl-step\"><div class=\"dot\">02<\u002Fdiv><div class=\"v\"><em>1<\u002Fem>w<\u002Fdiv><h4>Interviews &amp; selection<\u002Fh4><p>bp manager reviews CVs and conducts technical and behavioural interviews.<\u002Fp><\u002Fdiv>\n      <div class=\"tl-step\"><div class=\"dot\">03<\u002Fdiv><div class=\"v\"><em>1–2<\u002Fem>w<\u002Fdiv><h4>Onboarding &amp; CLT registration<\u002Fh4><p>Offer letter, contract execution, background check, ASO, eSocial and benefits enrolment.<\u002Fp><\u002Fdiv>\n      <div class=\"tl-step\"><div class=\"dot\">04<\u002Fdiv><div class=\"v\">+<em>20<\u002Fem>d<\u002Fdiv><h4>Notice period<\u002Fh4><p>If the candidate is currently employed they must typically serve up to 20 days notice.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ NEXT STEPS ============ -->\n<section class=\"section tinted\">\n  <div class=\"doc\">\n    <div class=\"eyebrow\"><span class=\"badge\"><span class=\"dot\"><\u002Fspan>Section 10<\u002Fspan><span class=\"label\">Next steps<\u002Fspan><\u002Fdiv>\n    <h2 class=\"section-title\">From <em>proposal<\u002Fem> to <em>live CLT employment<\u002Fem>.<\u002Fh2>\n\n    <div class=\"next-steps\">\n      <div class=\"next-step\"><span class=\"n\">Step 01<\u002Fspan><h4>MRA sign-off &amp; role prioritisation<\u002Fh4><p>bp confirms rate benchmarks and identifies the initial roles. Scenario models for any specific salary or team composition on request.<\u002Fp><\u002Fdiv>\n      <div class=\"next-step\"><span class=\"n\">Step 02<\u002Fspan><h4>Master Service Agreement<\u002Fh4><p>Execution of the EOR MSA covering all current and future Golden Phoenix hires in Brazil.<\u002Fp><\u002Fdiv>\n      <div class=\"next-step\"><span class=\"n\">Step 03<\u002Fspan><h4>Recruitment kick-off<\u002Fh4><p>Role briefing call per priority hire. Sourcing begins within 48 hours. First candidates within 10 business days.<\u002Fp><\u002Fdiv>\n      <div class=\"next-step\"><span class=\"n\">Step 04<\u002Fspan><h4>Onboarding &amp; CLT registration<\u002Fh4><p>Contract execution, eSocial registration, benefits enrolment, and first-day handover for each accepted offer.<\u002Fp><\u002Fdiv>\n      <div class=\"next-step\"><span class=\"n\">Step 05<\u002Fspan><h4>Live employment &amp; ongoing HR<\u002Fh4><p>First monthly liquidação issued at month-end. Dedicated senior consultant remains on the account.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SIGN-OFF ============ -->\n<section class=\"signoff\">\n  <div class=\"signoff-hex\" aria-hidden=\"true\">\n    <svg viewBox=\"0 0 320 200\" xmlns=\"http://www.w3.org/2000/svg\">\n      <defs><symbol id=\"hex2\" viewBox=\"-50 -58 100 116\"><polygon points=\"0,-57.735 50,-28.868 50,28.868 0,57.735 -50,28.868 -50,-28.868\"><\u002Fpolygon><\u002Fsymbol><\u002Fdefs>\n      <g transform=\"translate(320,200)\">\n        <g transform=\"translate(-48,-28) scale(0.48)\"><use href=\"#hex2\" fill=\"#FFFFFF\" opacity=\"0.2\"><\u002Fuse><\u002Fg>\n        <g transform=\"translate(-96,-56) scale(0.48)\"><use href=\"#hex2\" fill=\"#0EC668\"><\u002Fuse><\u002Fg>\n        <g transform=\"translate(-144,-28) scale(0.48)\"><use href=\"#hex2\" fill=\"#12ACE6\"><\u002Fuse><\u002Fg>\n        <g transform=\"translate(-144,-84) scale(0.48)\"><use href=\"#hex2\" fill=\"#1C2637\"><\u002Fuse><\u002Fg>\n        <g transform=\"translate(-192,-56) scale(0.48)\"><use href=\"#hex2\" fill=\"#12ACE6\" opacity=\"0.5\"><\u002Fuse><\u002Fg>\n        <g transform=\"translate(-96,-112) scale(0.48)\"><use href=\"#hex2\" fill=\"#0EC668\" opacity=\"0.7\"><\u002Fuse><\u002Fg>\n      <\u002Fg>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"signoff-inner\">\n    <div class=\"eyebrow\"><span class=\"badge\" style=\"background:rgba(255,255,255,0.08)\"><span class=\"dot\"><\u002Fspan>Let's start<\u002Fspan><\u002Fdiv>\n    <h2>Your team, in Brazil, <em>simplified.<\u002Fem><\u002Fh2>\n    <p class=\"lede\">Sign-off this proposal and we'll send the master services agreement plus the recruitment kick-off pack within one business day.<\u002Fp>\n\n    <div class=\"signoff-meta\">\n      <div class=\"signoff-meta-card\"><div class=\"l\">Account lead<\u002Fdiv><div class=\"v\">Wide Brazil Commercial<br><a href=\"mailto:hello@widebrazil.com\">hello@widebrazil.com<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div class=\"signoff-meta-card\"><div class=\"l\">Validity<\u002Fdiv><div class=\"v\">This proposal is valid for 30 days from issue.<\u002Fdiv><\u002Fdiv>\n      <div class=\"signoff-meta-card\"><div class=\"l\">Reference<\u002Fdiv><div class=\"v\">WB-BR-EOR-2026-05 · v5.0<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"signoff-bottom\">\n      <div class=\"left\"><img src=\"3c7836d7-cbae-4f79-b20b-2c1476641844\" alt=\"Wide Brazil\"><span>widebrazil.com<\u002Fspan><\u002Fdiv>\n      <div>Confidential — prepared for bp / Bedrock — Golden Phoenix.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script>\n/* ============ Brazil CLT cost simulator ============ */\nconst FX_USD_BRL = 5.07; // 1 USD = 5.07 BRL (May 2026 reference)\nconst FEE_USD = 199;\nconst VAT = 0.085;\nconst PROFIT = 0.02;\n\nconst RATES = {\n  fgts: 0.08,\n  inss: 0.20,\n  sistemaS: 0.058,\n  thirteenth: 1/12,            // 8.333%\n  vacation: (1/12)/3,          // ~2.778% (vacation bonus 1/3)\n  // charges on provisions = (13th + vacation) × (FGTS + INSS + S + RAT)\n};\n\nconst state = { salary: 20000, cur: 'BRL', hc: 1, benefits: 14.7, rat: 3 };\n\nfunction fmtBRL(n){ return 'R$ ' + Math.round(n).toLocaleString('en-US').replace(/,/g,'.'); }\nfunction fmtUSD(n){ return '$ ' + Math.round(n).toLocaleString('en-US'); }\n\nfunction calc(){\n  // Salary always treated as BRL internally\n  const salaryBRL = state.cur === 'USD' ? state.salary * FX_USD_BRL : state.salary;\n  const rat = state.rat / 100;\n  const ben = state.benefits / 100;\n\n  const fgts = salaryBRL * RATES.fgts;\n  const inss = salaryBRL * RATES.inss;\n  const ratV = salaryBRL * rat;\n  const sis = salaryBRL * RATES.sistemaS;\n  const thirteenth = salaryBRL * RATES.thirteenth;\n  const vac = salaryBRL * RATES.vacation;\n  const socialRate = RATES.fgts + RATES.inss + rat + RATES.sistemaS;\n  const prov = (thirteenth + vac) * socialRate;\n  const benefits = salaryBRL * ben;\n  const profit = salaryBRL * PROFIT;\n\n  const subBRL = salaryBRL + fgts + inss + ratV + sis + thirteenth + vac + prov + benefits + profit;\n  const feeBRL = FEE_USD * FX_USD_BRL;\n  const beforeVATBRL = subBRL + feeBRL;\n  const vatBRL = beforeVATBRL * VAT;\n  const grandBRL = beforeVATBRL + vatBRL;\n  const grandUSD = grandBRL / FX_USD_BRL;\n  const subUSD = beforeVATBRL / FX_USD_BRL;\n  const vatUSD = vatBRL / FX_USD_BRL;\n\n  const markup = ((grandBRL - salaryBRL) / salaryBRL) * 100;\n  const annualHC = grandUSD * 12 * state.hc;\n\n  return {\n    salaryDisplay: state.cur === 'USD' ? Math.round(state.salary).toLocaleString('en-US') : Math.round(state.salary).toLocaleString('en-US').replace(/,/g,'.'),\n    salaryPrefix: state.cur === 'USD' ? '$' : 'R$',\n    grossBRL: fmtBRL(salaryBRL),\n    fgts: fmtBRL(fgts),\n    inss: fmtBRL(inss),\n    ratV: fmtBRL(ratV),\n    ratPct: state.rat.toFixed(1) + '%',\n    sis: fmtBRL(sis),\n    thirteenth: fmtBRL(thirteenth),\n    vac: fmtBRL(vac),\n    prov: fmtBRL(prov),\n    ben: fmtBRL(benefits),\n    benPct: state.benefits.toFixed(1) + '%',\n    profit: fmtBRL(profit),\n    fee: fmtUSD(FEE_USD),\n    subUSD: fmtUSD(subUSD),\n    vat: fmtUSD(vatUSD),\n    grandUSD: fmtUSD(grandUSD),\n    grandUSD2: fmtUSD(grandUSD),\n    grandBRL: fmtBRL(grandBRL),\n    markup: markup.toFixed(1) + '%',\n    annualHC: fmtUSD(annualHC),\n    hc: state.hc,\n    benefits: state.benefits.toFixed(1),\n    rat: state.rat.toFixed(1)\n  };\n}\n\nfunction render(){\n  const r = calc();\n  document.querySelectorAll('[data-out]').forEach(el => {\n    const k = el.dataset.out;\n    if (r[k] !== undefined) el.textContent = r[k];\n    else if (k === 'salary') el.textContent = r.salaryDisplay;\n    else if (k === 'cur-label') el.textContent = state.cur === 'USD' ? 'USD ($)' : 'BRL (R$)';\n  });\n  document.querySelectorAll('[data-c-prefix]').forEach(el => el.textContent = r.salaryPrefix);\n}\n\n// Bind inputs\ndocument.querySelectorAll('[data-in]').forEach(el => {\n  el.addEventListener('input', () => {\n    state[el.dataset.in] = +el.value;\n    render();\n  });\n});\ndocument.querySelectorAll('[data-seg]').forEach(seg => {\n  seg.querySelectorAll('button').forEach(b => {\n    b.addEventListener('click', () => {\n      seg.querySelectorAll('button').forEach(x => x.classList.remove('on'));\n      b.classList.add('on');\n      const key = seg.dataset.seg;\n      const val = b.dataset.val;\n      if (key === 'cur'){\n        // when switching currency, convert the salary so the number stays sensible\n        if (val === 'USD' && state.cur !== 'USD'){\n          state.salary = Math.round(state.salary / FX_USD_BRL / 500) * 500;\n          const input = document.querySelector('[data-in=\"salary\"]');\n          input.min = 1500; input.max = 12000; input.step = 250;\n          input.value = state.salary;\n        } else if (val === 'BRL' && state.cur !== 'BRL'){\n          state.salary = Math.round(state.salary * FX_USD_BRL / 500) * 500;\n          const input = document.querySelector('[data-in=\"salary\"]');\n          input.min = 8000; input.max = 60000; input.step = 500;\n          input.value = state.salary;\n        }\n        state.cur = val;\n      } else if (key === 'rat'){\n        state.rat = +val;\n      } else {\n        state[key] = val;\n      }\n      render();\n    });\n  });\n});\n\nrender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
